name: withdrawal-portal

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: withdrawal_portal
      POSTGRES_USER: withdrawal_portal
      POSTGRES_PASSWORD: ${WITHDRAWAL_POSTGRES_PASSWORD:?set WITHDRAWAL_POSTGRES_PASSWORD}
    volumes:
      - withdrawal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U withdrawal_portal -d withdrawal_portal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - withdrawal-portal

  app:
    image: withdrawal-portal-app:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:?set SHOPIFY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:?set SHOPIFY_API_SECRET}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:?set SHOPIFY_APP_URL}
      SCOPES: read_orders,write_app_proxy
      DATABASE_URL: postgresql://withdrawal_portal:${WITHDRAWAL_POSTGRES_PASSWORD:?set WITHDRAWAL_POSTGRES_PASSWORD}@postgres:5432/withdrawal_portal?schema=public
      APP_DATA_ENCRYPTION_KEY: ${APP_DATA_ENCRYPTION_KEY:?set APP_DATA_ENCRYPTION_KEY}
      LOOKUP_TOKEN_SECRET: ${LOOKUP_TOKEN_SECRET:?set LOOKUP_TOKEN_SECRET}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    expose:
      - "3000"
    networks:
      - withdrawal-portal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:?set APP_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - withdrawal-portal

volumes:
  withdrawal-postgres-data:
  caddy-data:
  caddy-config:

networks:
  withdrawal-portal:
    name: withdrawal-portal
    driver: bridge
